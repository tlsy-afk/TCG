<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>航海王 TCG 線上卡本</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0c111d; 
            color: #f8fafc;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            position: sticky;
            top: 0;
            background-color: rgba(12, 17, 29, 0.95);
            backdrop-filter: blur(8px);
            padding: 15px 20px;
            z-index: 100;
            border-bottom: 1px solid #1e293b;
        }
        
        header h1 {
            margin: 0 0 12px 0;
            font-size: 20px;
            text-align: center;
            color: #38bdf8; 
        }

        /* 搜尋框 */
        .search-box {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px; /* 稍微改成方正一點配合分類按鈕 */
            border: 1px solid #334155;
            background-color: #1e293b;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 12px;
        }
        .search-box::placeholder { color: #94a3b8; }

        /* --- 新增：分類按鈕區塊樣式 --- */
        .filter-container {
            display: flex;
            align-items: center;
            overflow-x: auto; /* 螢幕太小可左右滑動 */
            white-space: nowrap;
            padding-bottom: 4px;
        }
        .filter-container::-webkit-scrollbar {
            display: none; /* 隱藏滑動條讓畫面更乾淨 */
        }
        
        .filter-label {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            margin-right: 12px;
            color: #f8fafc;
        }
        /* 標籤旁邊的垂直線 */
        .filter-label span {
            display: inline-block;
            width: 4px;
            height: 16px;
            background-color: #f8fafc; 
            margin-right: 6px;
        }

        .filter-btn {
            background-color: transparent;
            color: #f8fafc;
            border: 2px solid #f8fafc;
            padding: 6px 12px;
            margin-right: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            /* 讓按鈕方正一點，符合你提供的截圖風格 */
            border-radius: 0; 
        }
        /* 選中時的狀態：反轉顏色 */
        .filter-btn.active {
            background-color: #f8fafc;
            color: #0c111d; 
        }
        /* ---------------------------------- */

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            padding: 12px;
            padding-bottom: 80px;
        }

        .card {
            background-color: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }

        .card-img {
            width: 100%;
            aspect-ratio: 63 / 88; 
            object-fit: cover; 
            background-color: #0f172a;
        }

        .card-info {
            padding: 10px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-name {
            font-size: 14px;
            font-weight: bold;
            margin: 0 0 4px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            font-size: 11px;
            color: #38bdf8;
            margin-bottom: 6px;
        }

        .card-price {
            font-size: 15px;
            color: #fbbf24;
            font-weight: bold;
            margin: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>🏴‍☠️ ONE PIECE TCG 線上圖鑑</h1>
        <input type="text" id="searchInput" class="search-box" placeholder="搜尋角色、卡號..." onkeyup="filterCards()">
        
        <div class="filter-container">
            <div class="filter-label"><span></span>分類</div>
            <button class="filter-btn active" onclick="setCategory('ALL', this)">ALL</button>
            <button class="filter-btn" onclick="setCategory('BOOSTERS', this)">BOOSTERS</button>
            <button class="filter-btn" onclick="setCategory('DECKS', this)">DECKS</button>
            <button class="filter-btn" onclick="setCategory('OTHER', this)">OTHER</button>
        </div>
    </header>

    <div class="gallery" id="cardGallery"></div>

    <script>
        // 目前選中的分類，預設為 ALL
        let currentCategory = 'ALL';

        // 【航海王卡牌資料庫】
        // ⚠️ 注意：我幫每筆資料加上了 "category" 欄位！
        const cardData = [
            { name: "蒙其·D·路飛 (漫畫異圖)", code: "OP05-119", rarity: "SEC", price: "詢價/暫存", image: "luffy.jpg", category: "BOOSTERS" },
            { name: "波特卡斯·D·艾斯", code: "OP02-013", rarity: "SR", price: "HK$ 120", image: "ace.jpg", category: "BOOSTERS" },
            { name: "ST-10 究極牌組 三船長", code: "ST-10", rarity: "Deck", price: "HK$ 150", image: "st10.jpg", category: "DECKS" },
            { name: "官方特製卡套 (索隆款)", code: "Sleeve", rarity: "Accessory", price: "HK$ 65", image: "sleeve.jpg", category: "OTHER" },
            { name: "大和", code: "OP01-121", rarity: "SEC", price: "HK$ 180", image: "yamato.jpg", category: "BOOSTERS" },
            { name: "ST-11 起步牌組 烏塔", code: "ST-11", rarity: "Deck", price: "HK$ 80", image: "st11.jpg", category: "DECKS" }
        ];

        const gallery = document.getElementById('cardGallery');

        // 生成卡牌畫面的功能
        function renderCards(cards) {
            gallery.innerHTML = '';
            cards.forEach(card => {
                const cardHTML = `
                    <div class="card">
                        <img src="${card.image}" class="card-img" alt="${card.name}" onerror="this.onerror=null; this.src='https://placehold.co/300x420/1e293b/ffffff?text=No+Image';">
                        <div class="card-info">
                            <div>
                                <p class="card-name">${card.name}</p>
                                <p class="card-tags">${card.code} · ${card.rarity}</p>
                            </div>
                            <p class="card-price">${card.price}</p>
                        </div>
                    </div>
                `;
                gallery.innerHTML += cardHTML;
            });
        }

        // 點擊分類按鈕時觸發的函數
        function setCategory(categoryName, btnElement) {
            currentCategory = categoryName;

            // 1. 把所有按鈕的 active 狀態移除
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            // 2. 替目前點擊的這顆按鈕加上 active (變成白底黑字)
            btnElement.classList.add('active');

            // 3. 重新過濾畫面
            filterCards();
        }

        // 同時處理「搜尋框」和「分類按鈕」的過濾邏輯
        function filterCards() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = cardData.filter(card => {
                // 檢查是否符合搜尋字詞
                const matchKeyword = card.name.toLowerCase().includes(keyword) || 
                                     card.code.toLowerCase().includes(keyword);
                
                // 檢查是否符合目前選中的分類
                const matchCategory = (currentCategory === 'ALL') || (card.category === currentCategory);

                // 必須同時符合「搜尋字」與「分類」才會顯示出來
                return matchKeyword && matchCategory;
            });
            
            renderCards(filtered);
        }

        // 網頁一打開先載入所有卡片
        renderCards(cardData);
    </script>

</body>
</html>
