<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE PIECE TCG</title>
    <style>
        /* --- 基礎設定與配色 (深色質感背景) --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0c111d; 
            color: #f8fafc;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 頂部固定區塊 (搜尋 + 兩層分類) --- */
        header {
            position: sticky;
            top: 0;
            background-color: rgba(12, 17, 29, 0.98);
            backdrop-filter: blur(8px);
            padding: 12px 15px;
            z-index: 100;
            border-bottom: 1px solid #1e293b;
        }
        
        header h1 {
            margin: 0 0 10px 0;
            font-size: 18px;
            text-align: center;
            color: #38bdf8;
            font-weight: 900;
        }

        /* 搜尋框 */
        .search-box {
            width: 100%;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 12px;
        }
        .search-box::placeholder { color: #94a3b8; }

        /* --- 分類按鈕區塊 --- */
        .filter-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            overflow-x: auto; 
            white-space: nowrap;
            padding-bottom: 3px;
        }
        .filter-row::-webkit-scrollbar { display: none; }
        
        .row-label {
            font-size: 13px;
            color: #94a3b8;
            margin-right: 10px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .filter-btn {
            background-color: transparent;
            color: #f8fafc;
            border: 1px solid #f8fafc;
            padding: 5px 12px;
            margin-right: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            border-radius: 0;
            flex-shrink: 0;
        }
        
        .filter-btn.active {
            background-color: #f8fafc;
            color: #0c111d; 
        }

        /* --- 卡牌展示區 --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            padding: 12px;
            padding-bottom: 80px;
        }

        .card {
            background-color: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }
        
        .card:active { transform: scale(1.02); }

        .card-img {
            width: 100%;
            aspect-ratio: 63 / 88;
            object-fit: cover;
            background-color: #334155;
            border-bottom: 1px solid #121722;
        }

        .card-info {
            padding: 10px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-name {
            font-size: 13px;
            font-weight: bold;
            margin: 0 0 3px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #f1f5f9;
        }

        .card-meta {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        
        .color-tag {
            display: inline-block;
            padding: 1px 4px;
            border-radius: 3px;
            margin-right: 3px;
            font-weight: bold;
            color: #fff;
        }
        
        .tag-red { background-color: #ef4444; }
        .tag-green { background-color: #22c55e; }
        .tag-blue { background-color: #3b82f6; }
        .tag-purple { background-color: #a855f7; }
        .tag-black { background-color: #111827; border: 1px solid #4b5563; }
        .tag-yellow { background-color: #eab308; color: #000; }
        .tag-multi { background-color: #64748b; }

        .card-price {
            font-size: 15px;
            color: #fbbf24;
            font-weight: 800;
            margin: 0;
            text-align: right;
        }
        
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🏴‍☠️ ONE PIECE TCG</h1>
        
        <input type="text" id="searchInput" class="search-box" placeholder="搜尋角色名、卡號、稀有度 (SEC/SR)..." onkeyup="filterCards()">
        
        <div class="filter-row" id="colorFilters">
            <span class="row-label">─ 顏色</span>
            <button class="filter-btn active" data-color="ALL">ALL</button>
            <button class="filter-btn" data-color="紅">紅</button>
            <button class="filter-btn" data-color="綠">綠</button>
            <button class="filter-btn" data-color="藍">藍</button>
            <button class="filter-btn" data-color="紫">紫</button>
            <button class="filter-btn" data-color="黑">黑</button>
            <button class="filter-btn" data-color="黃">黃</button>
            <button class="filter-btn" data-color="多色">多色</button>
        </div>
        
        <div class="filter-row" id="typeFilters">
            <span class="row-label">─ 卡片種類</span>
            <button class="filter-btn active" data-type="ALL">ALL</button>
            <button class="filter-btn" data-type="領航">領航</button>
            <button class="filter-btn" data-type="角色">角色</button>
            <button class="filter-btn" data-type="舞台">舞台</button>
            <button class="filter-btn" data-type="事件">事件</button>
        </div>
    </header>

    <div class="gallery" id="cardGallery"></div>

          { name: "激射光束!!", code: "OP01-029", rarity: "UC", price: "HK$ 10", image: "OP01-029.png", color: "紅", type: "事件" },
          { name: "兩年後!!!在夏波帝群島!!!", code: "OP01-030", rarity: "UC", price: "HK$ 10", image: "OP01-030.png", color: "紅", type: "事件" },

          // ===== 隱藏稀有 (Secret Rare) OP01-120 ~ OP01-121 =====
          { name: "傑克 (シャンクス)", code: "OP01-120", rarity: "SEC", price: "HK$ 200", image: "OP01-120.png", color: "紅", type: "角色" },
          { name: "大和 (ヤマト)", code: "OP01-121", rarity: "SEC", price: "HK$ 150", image: "OP01-121.png", color: "綠", type: "角色" }
        ];

        const gallery = document.getElementById('cardGallery');

        function renderCards(cards) {
            gallery.innerHTML = '';
            
            if (cards.length === 0) {
                gallery.innerHTML = '<div class="no-results">沒有找到符合條件的卡片 🏴‍☠️</div>';
                return;
            }

            cards.forEach(card => {
                // --- 💡 這裡加回了「顯示為多色」的邏輯 ---
                let displayColorName = card.color;
                let displayColorClass = '';

                if (card.color.includes(',')) {
                    displayColorName = '多色';
                    displayColorClass = 'tag-multi';
                } else {
                    const colorMap = { '紅':'tag-red', '綠':'tag-green', '藍':'tag-blue', '紫':'tag-purple', '黑':'tag-black', '黃':'tag-yellow' };
                    displayColorClass = colorMap[card.color] || 'tag-multi';
                }

                const cardHTML = `
                    <div class="card">
                        <img src="${card.image}" class="card-img" alt="${card.name}" onerror="this.onerror=null; this.src='https://placehold.co/300x420/334155/ffffff?text=OP-TCG';">
                        <div class="card-info">
                            <div>
                                <p class="card-name">${card.name}</p>
                                <p class="card-meta">
                                    <span class="color-tag ${displayColorClass}">${displayColorName}</span>
                                    ${card.code} · ${card.rarity} · ${card.type}
                                </p>
                            </div>
                            <p class="card-price">${card.price}</p>
                        </div>
                    </div>
                `;
                gallery.innerHTML += cardHTML;
            });
        }

        function setupFilterButtons() {
            document.querySelectorAll('#colorFilters .filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#colorFilters .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeColor = btn.getAttribute('data-color');
                    filterCards();
                });
            });

            document.querySelectorAll('#typeFilters .filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#typeFilters .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeType = btn.getAttribute('data-type');
                    filterCards();
                });
            });
        }

        function filterCards() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = cardData.filter(card => {
                const matchSearch = card.name.toLowerCase().includes(keyword) || 
                                     card.code.toLowerCase().includes(keyword) ||
                                     card.rarity.toLowerCase().includes(keyword);
                
                // --- 💡 這裡加回了「過濾多色」的邏輯 ---
                const isMultiColorCard = card.color.includes(','); 
                
                const matchColor = (activeColor === 'ALL') || 
                                   (activeColor === '多色' && isMultiColorCard) || 
                                   (card.color.includes(activeColor)); 
                
                const matchType = (activeType === 'ALL') || (card.type === activeType);

                return matchSearch && matchColor && matchType;
            });
            
            renderCards(filtered);
        }

        setupFilterButtons();
        renderCards(cardData);
    </script>

</body>
</html>
