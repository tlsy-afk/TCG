<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE PIECE TCG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* --- 基礎設定與配色 --- */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0c111d; color: #f8fafc; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        header { position: sticky; top: 0; background-color: rgba(12, 17, 29, 0.98); backdrop-filter: blur(8px); padding: 12px 15px; z-index: 100; border-bottom: 1px solid #1e293b; }
        header h1 { margin: 0 0 10px 0; font-size: 18px; text-align: center; color: #38bdf8; font-weight: 900; }
        
        .search-box { width: 100%; padding: 10px 15px; border-radius: 6px; border: 1px solid #334155; background-color: #1e293b; color: white; font-size: 16px; box-sizing: border-box; outline: none; margin-bottom: 12px; }
        .search-box::placeholder { color: #94a3b8; }
        
        .filter-row { display: flex; align-items: center; margin-bottom: 8px; overflow-x: auto; white-space: nowrap; padding-bottom: 3px; }
        .filter-row::-webkit-scrollbar { display: none; }
        .row-label { font-size: 13px; color: #94a3b8; margin-right: 10px; font-weight: bold; flex-shrink: 0; width: 65px; }
        
        /* 一般按鈕樣式 */
        .filter-btn { background-color: transparent; color: #f8fafc; border: 1px solid #f8fafc; padding: 5px 12px; margin-right: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: all 0.15s; border-radius: 0; flex-shrink: 0; }
        .filter-btn.active { background-color: #f8fafc; color: #0c111d; }

        /* 下拉選單專屬樣式 */
        .filter-select { 
            background-color: #1e293b; 
            color: #f8fafc; 
            border: 1px solid #334155; 
            padding: 6px 10px; 
            font-size: 13px; 
            font-weight: bold; 
            border-radius: 4px; 
            outline: none; 
            cursor: pointer;
            width: 160px;
        }
        .filter-select optgroup { color: #fbbf24; font-style: normal; background-color: #0c111d; }
        .filter-select option { color: #f8fafc; background-color: #1e293b; font-weight: normal; }
        
        /* 卡片網格與樣式 */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; padding-bottom: 80px; }
        .card { background-color: #1e293b; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.4); display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:active { transform: scale(1.02); }
        .card-img { width: 100%; aspect-ratio: 63 / 88; object-fit: cover; background-color: #334155; border-bottom: 1px solid #121722; }
        .card-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-name { font-size: 13px; font-weight: bold; margin: 0 0 3px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #f1f5f9; }
        .card-meta { font-size: 11px; color: #94a3b8; margin-bottom: 6px; display: flex; align-items: center; }
        
        /* 顏色標籤 */
        .color-tag { display: inline-block; padding: 2px 5px; border-radius: 4px; margin-right: 4px; font-weight: bold; font-size: 10px;}
        
        /* 底部：庫存與價格排版 */
        .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 10px; }
        .stock-text { font-size: 12px; color: #94a3b8; font-weight: 600; background-color: #0f172a; padding: 3px 8px; border-radius: 4px; }
        
        .card-price { font-size: 15px; color: #fbbf24; font-weight: 900; margin: 0; text-align: right; }
        .price-disabled { font-size: 12px; color: #4b5563; text-decoration: line-through; text-align: right; margin-bottom: 2px; }
        .out-of-stock { color: #94a3b8; background-color: #334155; padding: 4px 12px; border-radius: 6px; font-size: 13px; display: inline-block; font-weight: bold; }
        
        .no-results { grid-column: 1 / -1; text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }
        .loading { grid-column: 1 / -1; text-align: center; padding: 50px; color: #38bdf8; font-size: 18px; font-weight: bold;}
    </style>
</head>
<body>

    <header>
        <h1>🏴‍☠️ ONE PIECE TCG</h1>
        <input type="text" id="searchInput" class="search-box" placeholder="搜尋角色名、卡號..." oninput="filterCards()">
        
        <div class="filter-row" id="packFilters">
            <span class="row-label">─ 卡包系列</span>
            <select id="packSelect" class="filter-select">
                <option value="ALL">全部 (ALL)</option>
                <optgroup label="補充包">
                    <option value="OP17">OP17</option>
                    <option value="OP16">OP16</option>
                    <option value="OP15">OP15</option>
                    <option value="OP14">OP14</option>
                    <option value="OP13">OP13</option>
                    <option value="OP12">OP12</option>
                    <option value="OP11">OP11</option>
                    <option value="OP10">OP10</option>
                    <option value="OP09">OP09</option>
                    <option value="OP08">OP08</option>
                    <option value="OP07">OP07</option>
                    <option value="OP06">OP06</option>
                    <option value="OP05">OP05</option>
                    <option value="OP04">OP04</option>
                    <option value="OP03">OP03</option>
                    <option value="OP02">OP02</option>
                    <option value="OP01">OP01</option>
                </optgroup>
                <optgroup label="特殊補充包">
                    <option value="EB05">EB05</option>
                    <option value="EB04">EB04</option>
                    <option value="EB03">EB03</option>
                    <option value="EB02">EB02</option>
                    <option value="EB01">EB01</option>
                </optgroup>
                <optgroup label="高級補充包">
                    <option value="PRB02">PRB02</option>
                    <option value="PRB01">PRB01</option>
                </optgroup>
                <optgroup label="起始牌組">
                    <option value="ST">ST (預組)</option>
                </optgroup>
            </select>
        </div>

        <div class="filter-row" id="rarityFilters">
            <span class="row-label">─ 稀有度</span>
            <button class="filter-btn active" data-rarity="ALL">ALL</button>
            <button class="filter-btn" data-rarity="L">L</button>
            <button class="filter-btn" data-rarity="SEC">SEC</button>
            <button class="filter-btn" data-rarity="SR">SR</button>
            <button class="filter-btn" data-rarity="R">R</button>
            <button class="filter-btn" data-rarity="UC">UC</button>
            <button class="filter-btn" data-rarity="C">C</button>
            <button class="filter-btn" data-rarity="SP">SP</button>
            <button class="filter-btn" data-rarity="P">P</button>
            <button class="filter-btn" data-rarity="TR">TR</button>
        </div>

        <div class="filter-row" id="colorFilters">
            <span class="row-label">─ 顏色</span>
            <button class="filter-btn active" data-color="ALL">ALL</button>
            <button class="filter-btn" data-color="紅">紅</button>
            <button class="filter-btn" data-color="綠">綠</button>
            <button class="filter-btn" data-color="藍">藍</button>
            <button class="filter-btn" data-color="紫">紫</button>
            <button class="filter-btn" data-color="黑">黑</button>
            <button class="filter-btn" data-color="黃">黃</button>
            <button class="filter-btn" data-color="多色">多色</button>
        </div>
        
        <div class="filter-row" id="typeFilters">
            <span class="row-label">─ 卡片種類</span>
            <button class="filter-btn active" data-type="ALL">ALL</button>
            <button class="filter-btn" data-type="領航">領航</button>
            <button class="filter-btn" data-type="角色">角色</button>
            <button class="filter-btn" data-type="舞台">舞台</button>
            <button class="filter-btn" data-type="事件">事件</button>
        </div>
    </header>

    <div class="gallery" id="cardGallery">
        <div class="loading">資料載入中... 🏴‍☠️</div>
    </div>

    <script>
        let activeColor = 'ALL';
        let activeType = 'ALL';
        let activePack = 'ALL';   
        let activeRarity = 'ALL'; 
        let cardData = []; 

        const colorHexMap = { 
            '紅': '#ef4444', '綠': '#22c55e', '藍': '#3b82f6', 
            '紫': '#a855f7', '黑': '#111827', '黃': '#eab308' 
        };

        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRs93U82XZB3cfiP333BzJYlig0WgzXaqhhOohP0qtNmi0aoB6fxZirLbdVVTTC4NFHL5Xwnv17ZPrr/pub?output=csv'; 
        const noCacheUrl = SHEET_CSV_URL + '&t=' + new Date().getTime();

        const gallery = document.getElementById('cardGallery');

        Papa.parse(noCacheUrl, {
            download: true,
            header: true,
            transformHeader: function(header) { return header.trim().toLowerCase(); },
            complete: function(results) {
                cardData = results.data.filter(card => card.name && card.name.trim() !== "");
                if (cardData.length === 0) {
                    gallery.innerHTML = '<div class="no-results">有連上 Google 表格，但找不到有效的卡片資料 🏴‍☠️</div>';
                    return;
                }
                setupFilterButtons();
                filterCards(); 
            },
            error: function(error) {
                gallery.innerHTML = '<div class="no-results">Google 表格連線失敗，請檢查網址是否正確。🏴‍☠️</div>';
            }
        });

        function renderCards(cards) {
            if (cards.length === 0) {
                gallery.innerHTML = '<div class="no-results">沒有找到符合條件的卡片 🏴‍☠️</div>';
                return;
            }

            let htmlContent = '';

            cards.forEach(card => {
                let displayColorName = card.color ? card.color.trim() : '';
                let tagStyle = '';

                if (displayColorName.includes(',')) {
                    const colors = displayColorName.split(',');
                    const c1 = colorHexMap[colors[0].trim()] || '#64748b'; 
                    const c2 = colorHexMap[colors[1].trim()] || '#64748b'; 
                    tagStyle = `background: linear-gradient(135deg, ${c1} 50%, ${c2} 50%); color: #fff;`;
                    displayColorName = '多色';
                } else {
                    const c = colorHexMap[displayColorName] || '#64748b';
                    tagStyle = `background-color: ${c};`;
                    if (displayColorName === '黃') tagStyle += ' color: #000;'; 
                    else if (displayColorName === '黑') tagStyle += ' border: 1px solid #4b5563; color: #fff;'; 
                    else tagStyle += ' color: #fff;';
                }

                let stockNum = card.stock ? card.stock.trim() : '';
                let isOutOfStock = (stockNum === '0' || stockNum === '');
                let bottomHTML = '';

                if (isOutOfStock) {
                    bottomHTML = `
                        <div class="stock-text">庫存: 0</div>
                        <div style="text-align: right;">
                            ${card.price ? `<div class="price-disabled">${card.price}</div>` : ''}
                            <div class="out-of-stock">售罄</div>
                        </div>
                    `;
                } else {
                    bottomHTML = `
                        <div class="stock-text">庫存: ${stockNum}</div>
                        <div class="card-price">${card.price || ''}</div>
                    `;
                }

                htmlContent += `
                    <div class="card">
                        <img loading="lazy" src="${card.image}" class="card-img" alt="${card.name}" onerror="this.onerror=null; this.src='https://placehold.co/300x420/334155/ffffff?text=OP-TCG';">
                        <div class="card-info">
                            <div>
                                <p class="card-name">${card.name}</p>
                                <div class="card-meta">
                                    <span class="color-tag" style="${tagStyle}">${displayColorName}</span>
                                    <span>${card.code} · ${card.rarity}</span>
                                </div>
                            </div>
                            <div class="card-bottom">
                                ${bottomHTML}
                            </div>
                        </div>
                    </div>
                `;
            });

            gallery.innerHTML = htmlContent;
        }

        function setupFilterButtons() {
            document.getElementById('packSelect').addEventListener('change', function() {
                activePack = this.value;
                filterCards();
            });

            document.querySelectorAll('#colorFilters .filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#colorFilters .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeColor = btn.getAttribute('data-color');
                    filterCards();
                });
            });

            document.querySelectorAll('#typeFilters .filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#typeFilters .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeType = btn.getAttribute('data-type');
                    filterCards();
                });
            });

            document.querySelectorAll('#rarityFilters .filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#rarityFilters .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeRarity = btn.getAttribute('data-rarity');
                    filterCards();
                });
            });
        }

        function filterCards() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = cardData.filter(card => {
                const searchName = card.name ? card.name.toLowerCase() : '';
                const searchCode = card.code ? card.code.toLowerCase() : '';
                const searchRarity = card.rarity ? card.rarity.trim().toUpperCase() : '';
                
                const matchSearch = searchName.includes(keyword) || searchCode.includes(keyword);
                
                const cardColor = card.color || '';
                const isMultiColorCard = cardColor.includes(','); 
                const matchColor = (activeColor === 'ALL') || 
                                   (activeColor === '多色' && isMultiColorCard) || 
                                   (cardColor.includes(activeColor)); 
                
                const matchType = (activeType === 'ALL') || (card.type === activeType);
                
                // 🚀 【核心修改位置：卡包分類改判斷 Image 資料夾名稱】
                const imagePath = card.image ? card.image.toUpperCase() : '';
                // 例如 imagePath = "OP03/ST04-003.PNG"，split 取出第一段就會是 "OP03"
                // 若沒有資料夾路徑，例如只寫了 "ST04-003.PNG"，就會直接把檔名前綴拿來比對
                const packFromImage = imagePath.includes('/') ? imagePath.split('/')[0] : imagePath;
                
                // 判斷資料夾名稱是否以使用者選擇的 activePack 開頭
                // (例如選 ST，就會抓到資料夾名稱是 ST01, ST02... 開頭的圖片)
                const matchPack = (activePack === 'ALL') || (packFromImage.startsWith(activePack.toUpperCase()));

                const matchRarity = (activeRarity === 'ALL') || (searchRarity === activeRarity);

                return matchSearch && matchColor && matchType && matchPack && matchRarity;
            });
            
            renderCards(filtered);
        }
    </script>
</body>
</html>
